name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  DEPENDENCY_BUNDLE_IMAGE: ghcr.io/openprojectx/gradle-dependency-bundle:0.1.1

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bootstrap dependency bundle plugin
        run: |
          mkdir -p "$HOME/.m2/repository"
          container=$(docker create "$DEPENDENCY_BUNDLE_IMAGE")
          docker cp "$container:/m2/repository/." "$HOME/.m2/repository"
          docker rm "$container"

      - name: Run tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          docker version
          ./gradlew --no-configuration-cache test --stacktrace

      - name: Read project version
        run: |
          project_version="$(awk -F= '/^[[:space:]]*version[[:space:]]*=/{gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); print $2; exit}' gradle.properties)"
          test -n "$project_version"
          echo "PROJECT_VERSION=$project_version" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dependency image and run embedded offline verification
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          build-args: |
            PROJECT_VERSION=${{ env.PROJECT_VERSION }}
            DEPENDENCY_BUNDLE_IMAGE=${{ env.DEPENDENCY_BUNDLE_IMAGE }}
            USE_MIRRORS=false
          tags: kotlin-dataframex-dependencies:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run published example from the image repository offline
        run: docker/verify-dependency-image.sh kotlin-dataframex-dependencies:ci "$PROJECT_VERSION"
